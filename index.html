<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Pak Galuh - Soundboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Drama Pak Galuh</h1>
            <p class="subtitle">Soundboard</p>
        </header>

        <div class="soundboard"></div>

        <div class="controls">
            <button id="stop-all-btn" class="btn btn-stop">Stop</button>
            <button id="volume-btn" class="btn">Volume</button>
        </div>

        <div id="volume-control" class="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="70">
            <span id="volume-value">70%</span>
        </div>

        <div class="info-panel">
            <div class="info-item">
                <span class="label">Playing:</span>
                <span id="playing-sound">-</span>
            </div>
            <div class="info-item">
                <span class="label">Time:</span>
                <span id="playing-time">00:00</span> / <span id="total-time">00:00</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <footer>
            <small>Edit soundList in script.js to customize</small>
        </footer>
    </div>

    <div id="audio-container"></div>
    <script src="script.js"></script>
</body>
</html>
