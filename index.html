<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Pak Galuh - Soundboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Drama Pak Galuh</h1>
            <p class="subtitle">Interactive Soundboard</p>
        </header>

        <div class="soundboard">
            <!-- Sound buttons will be generated by JavaScript -->
        </div>

        <div class="controls">
            <button id="stop-all-btn" class="control-button stop-button">⏹️ Stop All</button>
            <button id="volume-btn" class="control-button volume-button">🔊 Volume</button>
        </div>

        <div class="volume-control" id="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="70" class="slider">
            <span id="volume-value">70%</span>
        </div>

        <div class="now-playing">
            <p><strong>Now Playing:</strong> <span id="playing-sound">None</span></p>
            <p><strong>Time:</strong> <span id="playing-time">00:00</span> / <span id="total-time">00:00</span></p>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <footer>
            <p>Customize sounds by editing the soundList in <code>script.js</code></p>
        </footer>
    </div>

    <!-- Audio container for dynamically created audio elements -->
    <div id="audio-container"></div>

    <script src="script.js"></script>
</body>
</html>
