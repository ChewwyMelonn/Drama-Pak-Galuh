<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Pak Galuh - Soundboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Drama Pak Galuh</h1>
            <p class="subtitle">Soundboard</p>
        </header>

        <div class="soundboard">
            <!-- Sound buttons generated by JavaScript -->
        </div>

        <div class="controls">
            <button id="stop-all-btn" class="control-button stop-button">Stop All</button>
            <button id="volume-btn" class="control-button">Volume</button>
        </div>

        <div class="volume-control" id="volume-control">
            <div class="volume-wrapper">
                <input type="range" id="volume-slider" min="0" max="100" value="70">
                <span id="volume-value">70%</span>
            </div>
        </div>

        <div class="now-playing">
            <div class="info-row">
                <label>Now Playing:</label>
                <span id="playing-sound">-</span>
            </div>
            <div class="info-row">
                <label>Time:</label>
                <span id="playing-time">00:00</span> / <span id="total-time">00:00</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <footer>
            <p>Edit soundList in script.js to customize</p>
        </footer>
    </div>

    <div id="audio-container"></div>
    <script src="script.js"></script>
</body>
</html>
